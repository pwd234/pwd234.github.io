const levelTimes = [90,85,80,75,70,65,60,55,50,45];
let currentLevel = 0;
let px=1, py=1;
const ex=13, ey=13;
let step=0, time, timer;

let tsx,tsy;
document.addEventListener('touchstart',e=>{tsx=e.touches[0].clientX;tsy=e.touches[0].clientY});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tsx;
  const dy=e.changedTouches[0].clientY-tsy;
  let nx=px,ny=py;
  if(Math.abs(dx)>Math.abs(dy)){ dx>20?nx++:dx<-20&&nx--; }
  else{ dy>20?ny++:dy<-20&&ny--; }
  move(nx,ny);
});

document.addEventListener('keydown',e=>{
  let nx=px,ny=py;
  switch(e.key){
    case 'ArrowUp':ny--;break; case 'ArrowDown':ny++;break;
    case 'ArrowLeft':nx--;break; case 'ArrowRight':nx++;break; default:return;
  }
  move(nx,ny);
});

function move(nx,ny){
  if(levels[currentLevel][ny][nx]===0){
    px=nx; py=ny; step++; stepEl.textContent=step;
    playMove();
    checkWin();
    draw();
  }
}

function checkWin(){
  if(px===ex&&py===ey){
    clearInterval(timer);
    playWin();
    if(currentLevel<9){
      currentLevel++;
      nextLevel();
    }else{
      playFinalWin();
      showConfetti();
      finalBox.style.display='block';
    }
  }
}

function nextLevel(){
  px=1; py=1; step=0;
  time=levelTimes[currentLevel];
  stepEl.textContent=0;
  levelEl.textContent=currentLevel+1;
  timeEl.textContent=time;
  startTimer();
  draw();
}

// ===================== 超萌迪士尼动漫跳跳虎 · 最终优化版 =====================
function drawTiger(x, y) {
  const cx = x * cell + 12;
  const cy = y * cell + 12;

  // 耳朵（橘色+黑色边）
  ctx.fillStyle = "#ff9800";
  ctx.beginPath(); ctx.ellipse(cx-7, cy-9, 5, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+7, cy-9, 5, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#222";
  ctx.beginPath(); ctx.arc(cx-7, cy-9, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+7, cy-9, 2.5, 0, Math.PI*2); ctx.fill();

  // 头部
  ctx.fillStyle = "#ff9800";
  ctx.beginPath(); ctx.arc(cx, cy, 10, 0, Math.PI*2); ctx.fill();

  // 虎纹（标志性！）
  ctx.fillStyle = "#222";
  ctx.fillRect(cx-3, cy-8, 6, 2);
  ctx.fillRect(cx-7, cy-5, 3, 2);
  ctx.fillRect(cx+4, cy-5, 3, 2);

  // 大眼睛
  ctx.fillStyle = "#fff";
  ctx.beginPath(); ctx.ellipse(cx-4, cy-1, 3, 3.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(cx+4, cy-1, 3, 3.5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = "#000";
  ctx.beginPath(); ctx.arc(cx-4, cy-1, 1.8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx+4, cy-1, 1.8, 0, Math.PI*2); ctx.fill();

  // 小鼻子
  ctx.fillStyle = "#000";
  ctx.beginPath(); ctx.arc(cx, cy+2, 1.2, 0, Math.PI*2); ctx.fill();

  // 胡须
  ctx.strokeStyle = "#333";
  ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(cx-6,cy+2); ctx.lineTo(cx-2,cy+1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx-6,cy+3); ctx.lineTo(cx-2,cy+3); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+6,cy+2); ctx.lineTo(cx+2,cy+1); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+6,cy+3); ctx.lineTo(cx+2,cy+3); ctx.stroke();
}

function draw(){
  ctx.clearRect(0,0,360,360);
  const m=levels[currentLevel];
  for(let y=0;y<size;y++){
    for(let x=0;x<size;x++){
      ctx.fillStyle=m[y][x]?'#6b8e23':'#fefbe2';
      ctx.fillRect(x*cell,y*cell,cell,cell);
      ctx.strokeStyle='#556b2f'; ctx.lineWidth=1;
      ctx.strokeRect(x*cell,y*cell,cell,cell);
    }
  }

  ctx.fillStyle='#ff69b4';
  ctx.beginPath(); ctx.arc(ex*cell+12, ey*cell+12, 7, 0, Math.PI*2); ctx.fill();

  drawTiger(px, py);
}

function startTimer(){
  clearInterval(timer);
  timer=setInterval(()=>{
    time--; timeEl.textContent=time;
    if(time<=0){alert('时间到，重新挑战');nextLevel()}
  },1000);
}

function showConfetti(){
  const colors=['#ff6b9d','#ff9800','#4fc3f7','#81c784','#ffd54f'];
  confetti.innerHTML='';
  for(let i=0;i<150;i++){
    const c=document.createElement('div');
    c.style.position='absolute';
    c.style.width='6px'; c.style.height='3px';
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.left=Math.random()*100+'%';
    c.style.top='-10px';
    c.style.animation=`fall ${2.2+Math.random()*2}s linear forwards`;
    c.style.opacity=0.9;
    confetti.appendChild(c);
  }
  setTimeout(()=>confetti.innerHTML='',5000);
}

let style=document.createElement('style');
style.innerHTML=`@keyframes fall{100%{top:100%;transform:rotate(600deg);}}`;
document.head.appendChild(style);

function fullReset(){
  currentLevel=0;
  finalBox.style.display='none';
  confetti.innerHTML='';
  nextLevel();
}

restartAllBtn.onclick=fullReset;
document.addEventListener('touchstart',playBGM,{once:true});
fullReset();
</script>
</body>
</html>
