const levelTimes = [90,85,80,75,70,65,60,55,50,45];
let currentLevel = 0;
let px=1, py=1;
const ex=13, ey=13;
let step=0, time, timer;

let tsx,tsy;
document.addEventListener('touchstart',e=>{tsx=e.touches[0].clientX;tsy=e.touches[0].clientY});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tsx;
  const dy=e.changedTouches[0].clientY-tsy;
  let nx=px,ny=py;
  if(Math.abs(dx)>Math.abs(dy)){ dx>20?nx++:dx<-20&&nx--; }
  else{ dy>20?ny++:dy<-20&&ny--; }
  move(nx,ny);
});

document.addEventListener('keydown',e=>{
  let nx=px,ny=py;
  switch(e.key){
    case 'ArrowUp':ny--;break; case 'ArrowDown':ny++;break;
    case 'ArrowLeft':nx--;break; case 'ArrowRight':nx++;break; default:return;
  }
  move(nx,ny);
});

function move(nx,ny){
  if(levels[currentLevel][ny][nx]===0){
    px=nx; py=ny; step++; stepEl.textContent=step;
    playMove();
    checkWin();
    draw();
  }
}

function checkWin(){
  if(px===ex&&py===ey){
    clearInterval(timer);
    playWin();
    if(currentLevel<9){
      currentLevel++;
      nextLevel();
    }else{
      playFinalWin();
      showConfetti();
      finalBox.style.display='block';
    }
  }
}

function nextLevel(){
  px=1; py=1; step=0;
  time=levelTimes[currentLevel];
  stepEl.textContent=0;
  levelEl.textContent=currentLevel+1;
  timeEl.textContent=time;
  startTimer();
  draw();
}
