<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>跳跳虎迷宫大冒险 - 送给康佳萍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            -webkit-text-size-adjust: 100%;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', STHeiti, 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0c0c1a 0%, #121230 50%, #0a0a2a 100%);
            color: #f0f8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            touch-action: none;
        }
        
        .header {
            text-align: center;
            margin: 10px 0 5px;
            width: 100%;
            padding: 0 10px;
        }
        
        h1 {
            color: #FFD700;
            font-size: 1.6rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            background: linear-gradient(90deg, #FF8C00, #FFD700, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
        }
        
        h1:after {
            content: "🐯";
            position: absolute;
            right: -25px;
            top: 0;
            font-size: 1.3rem;
        }
        
        .subtitle {
            color: #a3d9ff;
            font-size: 0.8rem;
            margin-bottom: 8px;
        }
        
        .dedication {
            background: linear-gradient(90deg, #ff3366, #ff6699);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 8px;
            box-shadow: 0 4px 12px rgba(255, 51, 102, 0.4);
            text-align: center;
            max-width: 280px;
            margin: 0 auto 10px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            height: calc(100vh - 170px);
            padding: 0 8px;
        }
        
        .game-board {
            background: rgba(20, 20, 40, 0.9);
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.7);
            padding: 8px;
            width: 100%;
            height: 100%;
            min-height: 250px;
            position: relative;
            overflow: hidden;
            border: 2px solid #4a4a8a;
        }
        
        .maze-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: linear-gradient(180deg, #1a1a3a 0%, #2a2a4a 100%);
            border-radius: 6px;
            overflow: hidden;
        }
        
        #maze-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            width: 100%;
            margin-top: 10px;
            padding: 0 8px;
        }
        
        .stats-row {
            display: flex;
            justify-content: space-between;
            background: rgba(30, 30, 60, 0.9);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            border: 2px solid #5a5aaa;
        }
        
        .stat {
            text-align: center;
            flex: 1;
        }
        
        .stat-label {
            font-size: 0.7rem;
            color: #a3d9ff;
            margin-bottom: 4px;
        }
        
        .stat-value {
            font-size: 1rem;
            font-weight: bold;
            color: #FFD700;
        }
        
        .buttons-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        
        .button {
            flex: 1;
            background: linear-gradient(to right, #FF8C00, #FFA500);
            color: white;
            border: none;
            padding: 10px 5px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            -webkit-appearance: none;
        }
        
        .button:active {
            transform: scale(0.95);
            box-shadow: 0 3px 10px rgba(255, 140, 0, 0.4);
        }
        
        .button.secondary {
            background: linear-gradient(to right, #6a5acd, #836fff);
        }
        
        .button.restart {
            background: linear-gradient(to right, #ff416c, #ff4b2b);
        }
        
        .direction-controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 6px;
            margin-top: 8px;
            padding: 12px;
            background: rgba(40, 40, 80, 0.7);
            border-radius: 8px;
            touch-action: none;
        }
        
        .direction-btn {
            background: rgba(60, 60, 120, 0.9);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 50px;
            font-size: 1.8rem;
            color: #fff;
            border: 2px solid #7b68ee;
            cursor: pointer;
            transition: all 0.1s;
            -webkit-touch-callout: none;
        }
        
        .direction-btn:active {
            background: rgba(80, 80, 160, 0.9);
            transform: scale(0.9);
        }
        
        .direction-btn.up {
            grid-column: 2;
            grid-row: 1;
        }
        
        .direction-btn.left {
            grid-column: 1;
            grid-row: 2;
        }
        
        .direction-btn.down {
            grid-column: 2;
            grid-row: 2;
        }
        
        .direction-btn.right {
            grid-column: 3;
            grid-row: 2;
        }
        
        .instructions {
            background: rgba(40, 40, 80, 0.7);
            border-radius: 8px;
            padding: 10px;
            margin-top: 8px;
            font-size: 0.7rem;
            line-height: 1.3;
            color: #d0d0f0;
        }
        
        .music-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 8px;
        }
        
        .music-btn {
            background: #4a4a8a;
            color: white;
            border: none;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .creator {
            margin-top: 10px;
            text-align: center;
            color: #a3d9ff;
            font-size: 0.7rem;
            padding: 8px;
            width: 100%;
        }
        
        .creator span {
            color: #FFD700;
            font-weight: bold;
        }
        
        .message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            color: white;
            padding: 15px 20px;
            border-radius: 12px;
            z-index: 1000;
            text-align: center;
            width: 85%;
            max-width: 300px;
            display: none;
            border: 3px solid #FFD700;
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
        }
        
        .message h3 {
            color: #FFD700;
            font-size: 1.3rem;
            margin-bottom: 8px;
        }
        
        .message p {
            margin: 6px 0;
            font-size: 0.9rem;
        }
        
        .encouragement-text {
            font-style: italic;
            color: #a3d9ff;
            margin: 8px 0;
            font-size: 1rem;
            line-height: 1.3;
        }
        
        .countdown {
            font-size: 1rem;
            color: #FFD700;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .footer {
            margin-top: 8px;
            text-align: center;
            color: #a3d9ff;
            font-size: 0.6rem;
            padding: 5px;
            width: 100%;
        }
        
        /* 微信浏览器特定优化 */
        ::-webkit-scrollbar {
            display: none;
        }
        
        /* 防止iOS Safari工具栏遮挡 */
        @supports (-webkit-touch-callout: none) {
            body {
                padding-top: env(safe-area-inset-top);
                padding-bottom: env(safe-area-inset-bottom);
                padding-left: env(safe-area-inset-left);
                padding-right: env(safe-area-inset-right);
            }
        }
        
        /* 防止微信浏览器下拉刷新 */
        body {
            overscroll-behavior: none;
        }
        
        /* 横屏优化 */
        @media (orientation: landscape) {
            .game-container {
                flex-direction: row;
                height: calc(100vh - 100px);
            }
            
            .game-board {
                flex: 2;
                margin-right: 10px;
            }
            
            .controls {
                flex: 1;
                margin-top: 0;
            }
            
            .dedication {
                max-width: 200px;
                font-size: 0.9rem;
                padding: 6px 12px;
            }
            
            h1 {
                font-size: 1.4rem;
            }
            
            h1:after {
                font-size: 1.1rem;
                right: -20px;
            }
        }
        
        @media (max-height: 600px) {
            .game-container {
                height: calc(100vh - 140px);
            }
            
            .game-board {
                min-height: 200px;
            }
            
            .direction-btn {
                height: 40px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>跳跳虎迷宫大冒险</h1>
        <p class="subtitle">10个逐渐增加的关卡</p>
        <div class="dedication">🎁 特别送给：<span>康佳萍</span> 🎁</div>
    </div>
    
    <div class="game-container">
        <div class="game-board">
            <div class="maze-container">
                <canvas id="maze-canvas"></canvas>
            </div>
        </div>
        
        <div class="controls">
            <div class="stats-row">
                <div class="stat">
                    <div class="stat-label">关卡</div>
                    <div class="stat-value" id="current-level">1/10</div>
                </div>
                <div class="stat">
                    <div class="stat-label">步数</div>
                    <div class="stat-value" id="move-count">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">用时</div>
                    <div class="stat-value" id="time-counter">00:00</div>
                </div>
            </div>
            
            <div class="buttons-row">
                <button class="button" id="start-btn">▶ 开始</button>
                <button class="button secondary" id="next-level-btn" disabled>⏭ 下一关</button>
                <button class="button restart" id="restart-btn">🔄 重玩</button>
            </div>
            
            <div class="direction-controls">
                <div class="direction-btn up" data-direction="up">↑</div>
                <div class="direction-btn left" data-direction="left">←</div>
                <div class="direction-btn down" data-direction="down">↓</div>
                <div class="direction-btn right" data-direction="right">→</div>
            </div>
            
            <div class="instructions">
                <p>使用方向按钮控制跳跳虎移动，从起点到达终点。收集星星可减少步数。</p>
                <div class="music-controls">
                    <button class="music-btn" id="music-toggle">🔊</button>
                    <span>背景音乐</span>
                </div>
            </div>
        </div>
    </div>
    
    <div class="creator">
        <p>本游戏是特别为 <span>康佳萍</span> 定制的迷宫冒险游戏！🐯</p>
    </div>
    
    <div class="message" id="level-complete">
        <h3>🎉 关卡完成！</h3>
        <p>通过了第 <span id="completed-level">1</span> 关！</p>
        <p>用时: <span id="completed-time">00:00</span></p>
        <p>步数: <span id="completed-moves">0</span></p>
        <div class="encouragement-text" id="encouragement-text">康佳萍，你太棒了！</div>
        <div class="countdown" id="countdown">3秒后自动进入下一关</div>
        <button class="button" id="continue-btn" style="margin-top: 8px;">立即进入下一关</button>
    </div>
    
    <div class="message" id="game-complete">
        <h3>🎉 游戏通关！</h3>
        <p>完成了所有10个关卡！</p>
        <p>总用时: <span id="total-time">00:00</span></p>
        <p>总步数: <span id="total-moves">0</span></p>
        <div class="encouragement-text">康佳萍，你真是个迷宫大师！太厉害了！🐯</div>
        <button class="button" id="play-again-btn" style="margin-top: 10px;">再玩一次</button>
    </div>
    
    <div class="footer">
        <p>跳跳虎迷宫大冒险 - 为康佳萍制作 | 专为微信优化</p>
    </div>
    
    <audio id="background-music" loop preload="auto">
        <source src="tiger.mp3" type="audio/mpeg">
    </audio>
    
    <script>
        (function() {
            'use strict';
            
            // 游戏变量
            let canvas, ctx;
            let mazeWidth, mazeHeight;
            let cellSize = 20;
            let maze = [];
            let player = { x: 1, y: 1 };
            let exit = { x: 1, y: 1 };
            let currentLevel = 1;
            let moveCount = 0;
            let startTime = 0;
            let gameTime = 0;
            let gameInterval;
            let gameActive = false;
            let musicEnabled = true;
            let stars = [];
            let collectedStars = 0;
            let totalMoves = 0;
            let totalTime = 0;
            let animationId = null;
            let countdownTimer = null;
            let countdownSeconds = 3;
            let audioContextInitialized = false;
            let isWeChat = /MicroMessenger/i.test(navigator.userAgent);
            
            // 鼓励语数组
            const encouragements = [
                "康佳萍，你太棒了！继续保持这个节奏！",
                "康佳萍，你真是迷宫小能手！太聪明了！",
                "康佳萍，你的智慧令人惊叹！继续前进！",
                "康佳萍，你越来越熟练了！为你骄傲！",
                "康佳萍，这迷宫对你来说小菜一碟！继续！",
                "康佳萍，你真是个解谜天才！太厉害了！",
                "康佳萍，你的耐心和智慧真让人佩服！",
                "康佳萍，你正在成为迷宫大师的路上！",
                "康佳萍，你的每一步都充满了智慧！",
                "康佳萍，你真是个游戏高手！为你喝彩！"
            ];
            
            // 关卡配置
            const levelConfigs = [
                { rows: 9, cols: 9, stars: 1, complexity: 0.4, algorithm: "dfs", extraWalls: 3 },
                { rows: 11, cols: 11, stars: 1, complexity: 0.45, algorithm: "dfs", extraWalls: 5 },
                { rows: 13, cols: 13, stars: 2, complexity: 0.5, algorithm: "prim", extraWalls: 8 },
                { rows: 15, cols: 15, stars: 2, complexity: 0.55, algorithm: "prim", extraWalls: 10 },
                { rows: 17, cols: 17, stars: 3, complexity: 0.6, algorithm: "dfs", extraWalls: 12 },
                { rows: 19, cols: 19, stars: 3, complexity: 0.65, algorithm: "prim", extraWalls: 15 },
                { rows: 21, cols: 21, stars: 4, complexity: 0.7, algorithm: "dfs", extraWalls: 18 },
                { rows: 23, cols: 23, stars: 4, complexity: 0.75, algorithm: "prim", extraWalls: 20 },
                { rows: 25, cols: 25, stars: 5, complexity: 0.8, algorithm: "dfs", extraWalls: 22 },
                { rows: 27, cols: 27, stars: 5, complexity: 0.85, algorithm: "prim", extraWalls: 25 }
            ];
            
            // 初始化游戏
            function initGame() {
                console.log("初始化游戏，微信环境:", isWeChat);
                
                canvas = document.getElementById('maze-canvas');
                ctx = canvas.getContext('2d');
                
                // 设置画布大小
                resizeCanvas();
                window.addEventListener('resize', resizeCanvas);
                window.addEventListener('orientationchange', resizeCanvas);
                
                // 初始化第一关
                loadLevel(currentLevel);
                
                // 设置事件监听器
                document.addEventListener('keydown', handleKeyPress);
                
                // 方向按钮事件
                setupDirectionButtons();
                
                // 按钮事件
                setupControlButtons();
                
                // 音乐控制
                setupMusicControls();
                
                // 微信特定优化
                if (isWeChat) {
                    setupWeChatOptimizations();
                }
                
                // 初始绘制
                drawMaze();
                
                console.log("游戏初始化完成");
            }
            
            // 设置方向按钮
            function setupDirectionButtons() {
                document.querySelectorAll('.direction-btn').forEach(button => {
                    // 触摸事件
                    button.addEventListener('touchstart', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        const direction = this.getAttribute('data-direction');
                        movePlayer(direction);
                        this.style.transform = 'scale(0.9)';
                        this.style.backgroundColor = 'rgba(100, 100, 180, 0.9)';
                    });
                    
                    button.addEventListener('touchend', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        this.style.transform = 'scale(1)';
                        this.style.backgroundColor = 'rgba(60, 60, 120, 0.9)';
                    });
                    
                    button.addEventListener('touchcancel', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        this.style.transform = 'scale(1)';
                        this.style.backgroundColor = 'rgba(60, 60, 120, 0.9)';
                    });
                    
                    // 鼠标事件
                    button.addEventListener('mousedown', function(e) {
                        e.preventDefault();
                        e.stopPropagation();
                        const direction = this.getAttribute('data-direction');
                        movePlayer(direction);
                        this.style.transform = 'scale(0.9)';
                        this.style.backgroundColor = 'rgba(100, 100, 180, 0.9)';
                    });
                    
                    button.addEventListener('mouseup', function() {
                        this.style.transform = 'scale(1)';
                        this.style.backgroundColor = 'rgba(60, 60, 120, 0.9)';
                    });
                    
                    button.addEventListener('mouseleave', function() {
                        this.style.transform = 'scale(1)';
                        this.style.backgroundColor = 'rgba(60, 60, 120, 0.9)';
                    });
                });
            }
            
            // 设置控制按钮
            function setupControlButtons() {
                document.getElementById('start-btn').addEventListener('click', startGame);
                document.getElementById('restart-btn').addEventListener('click', restartLevel);
                document.getElementById('next-level-btn').addEventListener('click', nextLevel);
                document.getElementById('continue-btn').addEventListener('click', function() {
                    clearCountdown();
                    nextLevel();
                });
                document.getElementById('play-again-btn').addEventListener('click', restartGame);
            }
            
            // 设置音乐控制
            function setupMusicControls() {
                const musicToggle = document.getElementById('music-toggle');
                const backgroundMusic = document.getElementById('background-music');
                
                // 设置音乐音量
                backgroundMusic.volume = 0.5;
                
                // 微信中自动初始化音频
                if (isWeChat) {
                    document.addEventListener('touchstart', function initAudio() {
                        if (!audioContextInitialized) {
                            backgroundMusic.load();
                            audioContextInitialized = true;
                            console.log("微信音频已初始化");
                        }
                        document.removeEventListener('touchstart', initAudio);
                    }, { once: true });
                }
                
                musicToggle.addEventListener('click', function() {
                    musicEnabled = !musicEnabled;
                    if (musicEnabled) {
                        backgroundMusic.play().catch(e => {
                            console.log("音乐播放失败:", e);
                        });
                        musicToggle.textContent = "🔊";
                    } else {
                        backgroundMusic.pause();
                        musicToggle.textContent = "🔇";
                    }
                });
            }
            
            // 微信特定优化
            function setupWeChatOptimizations() {
                // 防止微信下拉刷新
                document.addEventListener('touchmove', function(e) {
                    e.preventDefault();
                }, { passive: false });
                
                // 阻止微信默认行为
                document.addEventListener('gesturestart', function(e) {
                    e.preventDefault();
                });
                
                // 处理微信中的音频自动播放
                document.addEventListener('WeixinJSBridgeReady', function() {
                    const bgm = document.getElementById('background-music');
                    bgm.load();
                    audioContextInitialized = true;
                });
            }
            
            // 清除倒计时
            function clearCountdown() {
                if (countdownTimer) {
                    clearInterval(countdownTimer);
                    countdownTimer = null;
                }
            }
            
            // 开始倒计时
            function startCountdown() {
                countdownSeconds = 3;
                updateCountdownDisplay();
                
                clearCountdown();
                
                countdownTimer = setInterval(() => {
                    countdownSeconds--;
                    updateCountdownDisplay();
                    
                    if (countdownSeconds <= 0) {
                        clearCountdown();
                        nextLevel();
                    }
                }, 1000);
            }
            
            // 更新倒计时显示
            function updateCountdownDisplay() {
                const countdownElement = document.getElementById('countdown');
                if (countdownElement) {
                    countdownElement.textContent = `${countdownSeconds}秒后自动进入下一关`;
                }
            }
            
            // 调整画布大小
            function resizeCanvas() {
                const gameBoard = document.querySelector('.game-board');
                if (!gameBoard) return;
                
                const size = Math.min(gameBoard.offsetWidth, gameBoard.offsetHeight) - 16;
                
                canvas.width = size;
                canvas.height = size;
                
                const config = levelConfigs[currentLevel - 1];
                cellSize = Math.min(
                    Math.floor(size / config.cols),
                    Math.floor(size / config.rows)
                );
                
                if (cellSize < 8) cellSize = 8;
                
                drawMaze();
            }
            
            // 加载关卡
            function loadLevel(level) {
                currentLevel = Math.min(Math.max(level, 1), 10);
                moveCount = 0;
                collectedStars = 0;
                
                document.getElementById('current-level').textContent = `${currentLevel}/10`;
                document.getElementById('move-count').textContent = moveCount;
                document.getElementById('time-counter').textContent = '00:00';
                
                const config = levelConfigs[currentLevel - 1];
                generateMaze(config.rows, config.cols, config.complexity, config.algorithm, config.extraWalls);
                
                generateStars(config.stars);
                
                drawMaze();
                
                document.getElementById('next-level-btn').disabled = true;
            }
            
            // 生成迷宫
            function generateMaze(rows, cols, complexity, algorithm, extraWalls) {
                mazeWidth = cols;
                mazeHeight = rows;
                
                if (algorithm === "prim") {
                    generatePrimMaze(rows, cols, complexity);
                } else {
                    generateDFSMaze(rows, cols, complexity);
                }
                
                addExtraWalls(rows, cols, extraWalls);
                
                player.x = 1;
                player.y = 1;
                maze[player.y][player.x] = 0;
                
                // 设置终点在右下角
                exit.x = cols - 2;
                exit.y = rows - 2;
                
                // 确保终点是通路
                maze[exit.y][exit.x] = 0;
                
                // 确保终点可达
                ensureExitAccessible();
                
                // 确保有通路
                ensurePath(player.x, player.y, exit.x, exit.y, rows, cols);
            }
            
            // 深度优先搜索算法
            function generateDFSMaze(rows, cols, complexity) {
                maze = [];
                for (let y = 0; y < rows; y++) {
                    maze[y] = [];
                    for (let x = 0; x < cols; x++) {
                        maze[y][x] = 1;
                    }
                }
                
                const stack = [{x: 1, y: 1}];
                maze[1][1] = 0;
                
                while (stack.length > 0) {
                    const current = stack[stack.length - 1];
                    const neighbors = [];
                    
                    const directions = [
                        {dx: 0, dy: -2},
                        {dx: 2, dy: 0},
                        {dx: 0, dy: 2},
                        {dx: -2, dy: 0}
                    ];
                    
                    for (const dir of directions) {
                        const nx = current.x + dir.dx;
                        const ny = current.y + dir.dy;
                        
                        if (nx > 0 && nx < cols-1 && ny > 0 && ny < rows-1 && maze[ny][nx] === 1) {
                            neighbors.push({x: nx, y: ny, dir: dir});
                        }
                    }
                    
                    if (neighbors.length > 0) {
                        if (Math.random() < complexity) {
                            const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                            const wallX = current.x + next.dir.dx / 2;
                            const wallY = current.y + next.dir.dy / 2;
                            
                            maze[wallY][wallX] = 0;
                            maze[next.y][next.x] = 0;
                            stack.push(next);
                        } else {
                            const next = neighbors[Math.floor(Math.random() * neighbors.length)];
                            const wallX = current.x + next.dir.dx / 2;
                            const wallY = current.y + next.dir.dy / 2;
                            
                            maze[wallY][wallX] = 0;
                            maze[next.y][next.x] = 0;
                            stack.push(next);
                        }
                    } else {
                        stack.pop();
                    }
                }
                
                for (let x = 0; x < cols; x++) {
                    maze[0][x] = 1;
                    maze[rows-1][x] = 1;
                }
                for (let y = 0; y < rows; y++) {
                    maze[y][0] = 1;
                    maze[y][cols-1] = 1;
                }
            }
            
            // Prim算法
            function generatePrimMaze(rows, cols, complexity) {
                maze = [];
                for (let y = 0; y < rows; y++) {
                    maze[y] = [];
                    for (let x = 0; x < cols; x++) {
                        maze[y][x] = 1;
                    }
                }
                
                maze[1][1] = 0;
                const walls = [];
                
                addWalls(1, 1, walls, rows, cols);
                
                while (walls.length > 0) {
                    const randomIndex = Math.floor(Math.random() * walls.length);
                    const wall = walls[randomIndex];
                    
                    if (wall.dir === 'h') {
                        if (wall.y > 0 && wall.y < rows-1 && 
                            ((maze[wall.y-1][wall.x] === 0 && maze[wall.y+1][wall.x] === 1) ||
                             (maze[wall.y-1][wall.x] === 1 && maze[wall.y+1][wall.x] === 0))) {
                            
                            if (Math.random() < complexity) {
                                maze[wall.y][wall.x] = 0;
                                const newY = maze[wall.y-1][wall.x] === 0 ? wall.y+1 : wall.y-1;
                                maze[newY][wall.x] = 0;
                                addWalls(wall.x, newY, walls, rows, cols);
                            }
                        }
                    } else {
                        if (wall.x > 0 && wall.x < cols-1 &&
                            ((maze[wall.y][wall.x-1] === 0 && maze[wall.y][wall.x+1] === 1) ||
                             (maze[wall.y][wall.x-1] === 1 && maze[wall.y][wall.x+1] === 0))) {
                            
                            if (Math.random() < complexity) {
                                maze[wall.y][wall.x] = 0;
                                const newX = maze[wall.y][wall.x-1] === 0 ? wall.x+1 : wall.x-1;
                                maze[wall.y][newX] = 0;
                                addWalls(newX, wall.y, walls, rows, cols);
                            }
                        }
                    }
                    
                    walls.splice(randomIndex, 1);
                }
            }
            
            // 添加额外墙壁
            function addExtraWalls(rows, cols, extraWalls) {
                for (let i = 0; i < extraWalls; i++) {
                    let x, y;
                    let attempts = 0;
                    
                    do {
                        x = Math.floor(Math.random() * (cols - 4)) + 2;
                        y = Math.floor(Math.random() * (rows - 4)) + 2;
                        attempts++;
                    } while (attempts < 30 && (
                        (x === player.x && y === player.y) || 
                        (x === exit.x && y === exit.y) ||
                        maze[y][x] === 1 ||
                        isNearStartOrExit(x, y)
                    ));
                    
                    if (attempts < 30) {
                        maze[y][x] = 1;
                    }
                }
            }
            
            // 检查是否靠近起点或终点
            function isNearStartOrExit(x, y) {
                return Math.abs(x - player.x) <= 3 && Math.abs(y - player.y) <= 3 ||
                       Math.abs(x - exit.x) <= 3 && Math.abs(y - exit.y) <= 3;
            }
            
            // 确保终点可达
            function ensureExitAccessible() {
                const directions = [
                    {dx: 0, dy: -1},
                    {dx: 1, dy: 0},
                    {dx: 0, dy: 1},
                    {dx: -1, dy: 0}
                ];
                
                if (maze[exit.y][exit.x] !== 0) {
                    maze[exit.y][exit.x] = 0;
                }
                
                let accessible = false;
                for (const dir of directions) {
                    const nx = exit.x + dir.dx;
                    const ny = exit.y + dir.dy;
                    if (nx >= 0 && nx < mazeWidth && ny >= 0 && ny < mazeHeight && maze[ny][nx] === 0) {
                        accessible = true;
                        break;
                    }
                }
                
                if (!accessible) {
                    for (const dir of directions) {
                        const nx = exit.x + dir.dx;
                        const ny = exit.y + dir.dy;
                        if (nx >= 0 && nx < mazeWidth && ny >= 0 && ny < mazeHeight) {
                            maze[ny][nx] = 0;
                            break;
                        }
                    }
                }
            }
            
            // 添加墙到列表
            function addWalls(x, y, walls, rows, cols) {
                if (y > 1) walls.push({x, y: y-1, dir: 'h'});
                if (y < rows-2) walls.push({x, y: y+1, dir: 'h'});
                if (x > 1) walls.push({x: x-1, y, dir: 'v'});
                if (x < cols-2) walls.push({x: x+1, y, dir: 'v'});
            }
            
            // 确保有通路
            function ensurePath(startX, startY, endX, endY, rows, cols) {
                const visited = Array(rows).fill().map(() => Array(cols).fill(false));
                const stack = [{x: startX, y: startY}];
                visited[startY][startX] = true;
                
                while (stack.length > 0) {
                    const current = stack.pop();
                    
                    if (current.x === endX && current.y === endY) {
                        return true;
                    }
                    
                    const directions = [
                        {dx: 0, dy: -1},
                        {dx: 1, dy: 0},
                        {dx: 0, dy: 1},
                        {dx: -1, dy: 0}
                    ];
                    
                    for (const dir of directions) {
                        const nx = current.x + dir.dx;
                        const ny = current.y + dir.dy;
                        
                        if (nx >= 0 && nx < cols && ny >= 0 && ny < rows && 
                            maze[ny][nx] === 0 && !visited[ny][nx]) {
                            visited[ny][nx] = true;
                            stack.push({x: nx, y: ny});
                        }
                    }
                }
                
                let x = startX, y = startY;
                
                while (!(x === endX && y === endY)) {
                    if (x < endX) {
                        x++;
                    } else if (x > endX) {
                        x--;
                    } else if (y < endY) {
                        y++;
                    } else if (y > endY) {
                        y--;
                    }
                    
                    maze[y][x] = 0;
                }
                
                return true;
            }
            
            // 生成星星
            function generateStars(count) {
                stars = [];
                for (let i = 0; i < count; i++) {
                    let x, y;
                    let attempts = 0;
                    do {
                        x = Math.floor(Math.random() * (mazeWidth - 4)) + 2;
                        y = Math.floor(Math.random() * (mazeHeight - 4)) + 2;
                        attempts++;
                    } while (attempts < 30 && (
                        (x === player.x && y === player.y) || 
                        (x === exit.x && y === exit.y) || 
                        maze[y][x] === 1 || 
                        stars.some(star => Math.abs(star.x - x) < 2 && Math.abs(star.y - y) < 2)
                    ));
                    
                    if (attempts < 30) {
                        stars.push({x, y});
                    }
                }
            }
            
            // 绘制迷宫
            function drawMaze() {
                if (!canvas || !ctx) return;
                
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#1a1a3a';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                for (let y = 0; y < mazeHeight; y++) {
                    for (let x = 0; x < mazeWidth; x++) {
                        if (maze[y][x] === 1) {
                            const gradient = ctx.createLinearGradient(
                                x * cellSize, y * cellSize,
                                (x + 1) * cellSize, (y + 1) * cellSize
                            );
                            gradient.addColorStop(0, '#4a4a8a');
                            gradient.addColorStop(1, '#36366d');
                            
                            ctx.fillStyle = gradient;
                            ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                        }
                    }
                }
                
                stars.forEach(star => {
                    const x = star.x * cellSize + cellSize / 2;
                    const y = star.y * cellSize + cellSize / 2;
                    
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 8;
                    
                    const time = Date.now() / 1000;
                    const rotation = time * 2;
                    
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(rotation);
                    
                    ctx.fillStyle = '#ffd700';
                    ctx.beginPath();
                    
                    for (let i = 0; i < 10; i++) {
                        const angle = (i * 2 * Math.PI) / 10;
                        const radius = i % 2 === 0 ? cellSize/3 : cellSize/6;
                        const starX = Math.cos(angle) * radius;
                        const starY = Math.sin(angle) * radius;
                        
                        if (i === 0) {
                            ctx.moveTo(starX, starY);
                        } else {
                            ctx.lineTo(starX, starY);
                        }
                    }
                    
                    ctx.closePath();
                    ctx.fill();
                    ctx.restore();
                    
                    ctx.shadowBlur = 0;
                });
                
                const exitX = exit.x * cellSize;
                const exitY = exit.y * cellSize;
                
                if (exitX >= 0 && exitX < canvas.width && exitY >= 0 && exitY < canvas.height) {
                    ctx.shadowColor = '#ff4444';
                    ctx.shadowBlur = 12;
                    
                    ctx.fillStyle = '#ff4444';
                    ctx.fillRect(exitX, exitY, cellSize, cellSize);
                    
                    ctx.shadowBlur = 0;
                    
                    ctx.fillStyle = 'white';
                    ctx.font = `bold ${Math.max(cellSize/2, 10)}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('出', exitX + cellSize / 2, exitY + cellSize / 2);
                }
                
                drawTiger(player.x, player.y);
                
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(5, 5, 100, 35);
                
                ctx.fillStyle = '#FFD700';
                ctx.font = `bold ${Math.max(cellSize/2, 10)}px Arial`;
                ctx.textAlign = 'left';
                ctx.fillText(`${currentLevel}/10`, 10, 20);
                ctx.fillText(`步:${moveCount}`, 10, 30);
            }
            
            // 绘制跳跳虎
            function drawTiger(x, y) {
                const centerX = x * cellSize + cellSize / 2;
                const centerY = y * cellSize + cellSize / 2;
                const tigerSize = cellSize * 0.6;
                
                ctx.fillStyle = '#FF8C00';
                ctx.beginPath();
                ctx.arc(centerX, centerY, tigerSize / 2, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#8B4513';
                ctx.fillRect(centerX - tigerSize/2, centerY - tigerSize/4, tigerSize, tigerSize/8);
                
                ctx.fillStyle = '#FF8C00';
                ctx.beginPath();
                ctx.arc(centerX - tigerSize/3, centerY - tigerSize/2, tigerSize/5, 0, Math.PI * 2);
                ctx.arc(centerX + tigerSize/3, centerY - tigerSize/2, tigerSize/5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(centerX - tigerSize/4, centerY - tigerSize/6, tigerSize/6, 0, Math.PI * 2);
                ctx.arc(centerX + tigerSize/4, centerY - tigerSize/6, tigerSize/6, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(centerX - tigerSize/4, centerY - tigerSize/6, tigerSize/10, 0, Math.PI * 2);
                ctx.arc(centerX + tigerSize/4, centerY - tigerSize/6, tigerSize/10, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(centerX, centerY, tigerSize/8, 0, Math.PI * 2);
                ctx.fill();
                
                if (gameActive) {
                    const jumpHeight = Math.sin(Date.now() / 200) * 2;
                    ctx.shadowColor = '#FF8C00';
                    ctx.shadowBlur = 6;
                    ctx.shadowOffsetY = -jumpHeight;
                    
                    ctx.fillStyle = '#FF8C00';
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, tigerSize / 2, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.shadowBlur = 0;
                    ctx.shadowOffsetY = 0;
                }
            }
            
            // 开始游戏
            function startGame() {
                if (gameActive) return;
                
                gameActive = true;
                startTime = Date.now();
                document.getElementById('start-btn').disabled = true;
                
                gameInterval = setInterval(updateTimer, 1000);
                
                animateTiger();
                
                if (musicEnabled) {
                    const backgroundMusic = document.getElementById('background-music');
                    backgroundMusic.play().catch(e => {
                        console.log("音乐播放失败:", e);
                    });
                }
            }
            
            // 更新计时器
            function updateTimer() {
                if (!gameActive) return;
                
                const now = Date.now();
                gameTime = Math.floor((now - startTime) / 1000);
                
                const minutes = Math.floor(gameTime / 60).toString().padStart(2, '0');
                const seconds = (gameTime % 60).toString().padStart(2, '0');
                
                document.getElementById('time-counter').textContent = `${minutes}:${seconds}`;
            }
            
            // 跳跳虎动画
            function animateTiger() {
                if (!gameActive) {
                    if (animationId) {
                        cancelAnimationFrame(animationId);
                        animationId = null;
                    }
                    return;
                }
                
                drawMaze();
                animationId = requestAnimationFrame(animateTiger);
            }
            
            // 处理按键
            function handleKeyPress(e) {
                if (!gameActive) return;
                
                let direction = null;
                switch(e.key) {
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        direction = 'up';
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        direction = 'down';
                        break;
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        direction = 'left';
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        direction = 'right';
                        break;
                }
                
                if (direction) {
                    movePlayer(direction);
                    e.preventDefault();
                }
            }
            
            // 移动玩家
            function movePlayer(direction) {
                if (!gameActive) return;
                
                let newX = player.x;
                let newY = player.y;
                
                switch(direction) {
                    case 'up': newY--; break;
                    case 'down': newY++; break;
                    case 'left': newX--; break;
                    case 'right': newX++; break;
                }
                
                if (newX < 0 || newX >= mazeWidth || newY < 0 || newY >= mazeHeight || maze[newY][newX] === 1) {
                    return;
                }
                
                player.x = newX;
                player.y = newY;
                moveCount++;
                document.getElementById('move-count').textContent = moveCount;
                
                for (let i = stars.length - 1; i >= 0; i--) {
                    if (stars[i].x === player.x && stars[i].y === player.y) {
                        stars.splice(i, 1);
                        collectedStars++;
                    }
                }
                
                if (player.x === exit.x && player.y === exit.y) {
                    completeLevel();
                }
            }
            
            // 完成关卡
            function completeLevel() {
                gameActive = false;
                clearInterval(gameInterval);
                
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                
                totalMoves += moveCount;
                totalTime += gameTime;
                
                document.getElementById('completed-level').textContent = currentLevel;
                document.getElementById('completed-moves').textContent = moveCount;
                
                const minutes = Math.floor(gameTime / 60).toString().padStart(2, '0');
                const seconds = (gameTime % 60).toString().padStart(2, '0');
                document.getElementById('completed-time').textContent = `${minutes}:${seconds}`;
                
                const randomEncouragement = encouragements[Math.floor(Math.random() * encouragements.length)];
                document.getElementById('encouragement-text').textContent = randomEncouragement;
                
                if (currentLevel >= 10) {
                    completeGame();
                } else {
                    document.getElementById('level-complete').style.display = 'block';
                    startCountdown();
                }
                
                drawMaze();
            }
            
            // 完成游戏
            function completeGame() {
                const totalMinutes = Math.floor(totalTime / 60).toString().padStart(2, '0');
                const totalSeconds = (totalTime % 60).toString().padStart(2, '0');
                
                document.getElementById('total-time').textContent = `${totalMinutes}:${totalSeconds}`;
                document.getElementById('total-moves').textContent = totalMoves;
                document.getElementById('game-complete').style.display = 'block';
                
                clearCountdown();
            }
            
            // 下一关
            function nextLevel() {
                document.getElementById('level-complete').style.display = 'none';
                
                if (currentLevel < 10) {
                    currentLevel++;
                    loadLevel(currentLevel);
                    document.getElementById('next-level-btn').disabled = true;
                    document.getElementById('start-btn').disabled = false;
                } else {
                    completeGame();
                }
            }
            
            // 重新开始关卡
            function restartLevel() {
                loadLevel(currentLevel);
                gameActive = false;
                clearInterval(gameInterval);
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                document.getElementById('start-btn').disabled = false;
                
                clearCountdown();
                document.getElementById('level-complete').style.display = 'none';
            }
            
            // 重新开始游戏
            function restartGame() {
                currentLevel = 1;
                totalMoves = 0;
                totalTime = 0;
                loadLevel(currentLevel);
                gameActive = false;
                clearInterval(gameInterval);
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                document.getElementById('start-btn').disabled = false;
                document.getElementById('game-complete').style.display = 'none';
                
                clearCountdown();
            }
            
            // 页面加载完成后初始化
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initGame);
            } else {
                initGame();
            }
        })();
    </script>
