<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跳跳虎迷宫大冒险</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #f0f8ff;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 900px;
        }
        
        h1 {
            color: #FFD700;
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            background: linear-gradient(90deg, #FF8C00, #FFD700, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            position: relative;
        }
        
        h1:after {
            content: "🐯";
            position: absolute;
            right: -50px;
            top: 0;
            font-size: 2.5rem;
        }
        
        .subtitle {
            color: #a3d9ff;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        
        .game-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            max-width: 1200px;
            width: 100%;
        }
        
        .game-board {
            background: rgba(25, 25, 50, 0.8);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            padding: 20px;
            width: 700px;
            height: 700px;
            position: relative;
            overflow: hidden;
            border: 3px solid #4a4a8a;
        }
        
        .maze-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: #1e1e3a;
            border-radius: 10px;
            overflow: hidden;
        }
        
        .controls {
            background: rgba(30, 30, 60, 0.9);
            border-radius: 15px;
            padding: 25px;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border: 2px solid #5a5aaa;
        }
        
        .control-group {
            background: rgba(40, 40, 80, 0.7);
            border-radius: 10px;
            padding: 15px;
        }
        
        h2 {
            color: #FFB347;
            font-size: 1.6rem;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 2px solid #FFB347;
            padding-bottom: 8px;
        }
        
        .level-info {
            font-size: 1.3rem;
            margin-bottom: 10px;
            text-align: center;
            color: #90ee90;
        }
        
        .level-info span {
            color: #FFD700;
            font-weight: bold;
            font-size: 1.8rem;
        }
        
        .instructions {
            font-size: 1rem;
            line-height: 1.5;
            color: #d0d0f0;
        }
        
        .instructions ul {
            padding-left: 20px;
            margin-top: 10px;
        }
        
        .instructions li {
            margin-bottom: 8px;
        }
        
        .button {
            background: linear-gradient(to right, #FF8C00, #FFA500);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-weight: bold;
            margin-top: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

            transform: translateY(-3px);
            box-shadow
