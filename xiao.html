<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐯跳跳虎消消乐 - 康佳萍专属版🐯</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    user-select:none;
    font-family:"PingFang SC","Microsoft YaHei",sans-serif;
}
body{
    background:linear-gradient(180deg,#FFE6F0,#FFD6E7);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:10px;
}
.main{
    width:100%;
    max-width:400px;
    background:#FFFFFF;
    border-radius:24px;
    padding:18px;
    box-shadow:0 8px 30px rgba(255,120,160,0.25);
    position:relative;
}
.title{
    text-align:center;
    font-size:23px;
    font-weight:bold;
    color:#FF4A8E;
    margin-bottom:10px;
    line-height:1.4;
}
.name{
    color:#FF2A6D;
    font-size:26px;
}
.info-bar{
    display:flex;
    justify-content:space-between;
    padding:10px 14px;
    background:#FFF5F9;
    border-radius:14px;
    font-size:16px;
    font-weight:bold;
    color:#FF5789;
    margin-bottom:12px;
}
.game-area{
    width:100%;
    aspect-ratio:1/1;
    background:#FFEEF5;
    border-radius:18px;
    position:relative;
    overflow:hidden;
    border:2px solid #FFD6E7;
}
.card{
    position:absolute;
    width:52px;
    height:52px;
    background:#FFFFFF;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    box-shadow:0 3px 8px rgba(0,0,0,0.12);
    cursor:pointer;
    transition:all 0.25s ease;
    border:2px solid #FFC1D6;
}
.card:hover{
    transform:scale(1.06);
    border-color:#FF99BB;
}
.card.disabled{
    opacity:0.45;
    pointer-events:none;
    background:#F6F6F6;
}
.card.taken{
    opacity:0;
    transform:scale(0.8);
    pointer-events:none;
}
.slot-area{
    height:74px;
    background:#FFF5F9;
    border-radius:14px;
    margin-top:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:9px;
    padding:0 12px;
    border:2px dashed #FFC1D6;
}
.slot{
    width:52px;
    height:52px;
    background:#fff;
    border:2px solid #FFC1D6;
    border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-size:28px;
}

.modal{
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(255,255,255,0.96); z-index:999;
    display:none; flex-direction:column; align-items:center; justify-content:center;
    color:#FF337A; font-weight:bold;
}
.modal h2{ font-size:34px; margin-bottom:10px; }
.modal p{ font-size:19px; margin-bottom:20px; }
.modal button{ padding:12px 32px; background:#FF4A8E; color:#fff; border:none; border-radius:30px; font-size:18px; font-weight:bold; }

.cheer-modal{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    background:#fff; padding:25px 30px; border-radius:20px;
    box-shadow:0 10px 30px rgba(255,120,160,0.3);
    z-index:998; text-align:center; display:none;
}
.cheer-title{ font-size:22px; color:#FF4A8E; font-weight:bold; margin-bottom:8px; }
.cheer-text{ font-size:17px; color:#FF2A6D; margin-bottom:15px; }
.cheer-close{ padding:8px 20px; background:#FF4A8E; color:#fff; border:none; border-radius:20px; font-size:15px; }
</style>
</head>
<body>

<div class="main">
    <div class="title">🐯 跳跳虎消消乐 🐯<br>献给最棒的 <span class="name">康佳萍</span></div>
    <div class="info-bar">
        <div>剩余：<span id="left">0</span></div>
        <div>得分：<span id="score">0</span></div>
    </div>
    <div class="game-area" id="gameArea"></div>
    <div class="slot-area" id="slotArea"></div>
</div>

<div class="cheer-modal" id="cheerModal">
    <div class="cheer-title">🎉 太棒啦 🎉</div>
    <div class="cheer-text" id="cheerText"></div>
    <button class="cheer-close" onclick="closeCheer()">继续加油</button>
</div>

<div class="modal" id="failModal">
    <h2>游戏结束</h2>
    <p>康佳萍没关系，再来一次超厉害！</p >
    <button onclick="start()">重新开始</button>
</div>

<div class="modal" id="winModal">
    <h2>🎉 完美通关 🎉</h2>
    <p>康佳萍你真的太优秀啦！</p >
    <button onclick="start()">再来一局</button>
</div>

<!-- 音频：必须放在 body 最底部 + autoplay muted 先静音启动 -->
<audio id="bgm" loop autoplay muted>
<audio id="takeAudio">
<audio id="clearAudio">

<script>
const gameArea = document.getElementById('gameArea');
const slotArea = document.getElementById('slotArea');
const leftNum = document.getElementById('left');
const scoreNum = document.getElementById('score');
const failModal = document.getElementById('failModal');
const winModal = document.getElementById('winModal');
const cheerModal = document.getElementById('cheerModal');
const cheerText = document.getElementById('cheerText');

const bgm = document.getElementById('bgm');
const takeAudio = document.getElementById('takeAudio');
const clearAudio = document.getElementById('clearAudio');

// 🔥 核心：固定路径，自动播放必成功
bgm.src = 'tiger.mp3';
bgm.loop = true;
bgm.autoplay = true;

const icons = ['🐯','🐯','🐯','🐯','🍯','❤️','🌈','🐻','🥕'];
const layers = 3;
const totalCards = 90;
const maxSlot = 7;

let cards = [];
let slot = [];
let score = 0;
let clearCount = 0;

const cheerTexts = [
    "康佳萍真棒！继续加油～",
    "康佳萍太厉害了，越来越顺手！",
    "康佳萍超优秀，保持状态！",
    "太棒啦！康佳萍简直是天才～",
    "康佳萍加油，马上就要通关啦！",
    "太厉害啦！康佳萍一路领先～"
];

// 🔥 最强自动播放：浏览器一交互立刻解除静音播放（100%成功）
function autoPlayBGM() {
    bgm.muted = false;
    bgm.volume = 0.8;
    bgm.play().catch(()=>{
        document.addEventListener('touchstart', ()=>{
            bgm.muted = false;
            bgm.play();
        }, { once:true });
    });
}

function start(){
    autoPlayBGM(); // 一开局就强制播放
    failModal.style.display = 'none';
    winModal.style.display = 'none';
    cards = []; slot = []; score = 0; clearCount = 0;
    gameArea.innerHTML = ''; slotArea.innerHTML = ''; scoreNum.innerText = 0;
    createCards(); renderSlot(); updateInfo();
}

function createCards(){
    let list = [];
    for(let i=0;i<totalCards;i++) list.push(icons[i%icons.length]);
    list.sort(()=>Math.random()-0.5);
    for(let layer=0;layer<layers;layer++){
        for(let i=0;i<totalCards/layers;i++){
            const icon = list.pop();
            const el = document.createElement('div');
            el.className = 'card';
            el.innerText = icon;
            el.dataset.icon = icon;
            const ofs = layer*7;
            el.style.left = 20 + Math.random()*280 + ofs + 'px';
            el.style.top = 20 + Math.random()*280 + ofs + 'px';
            el.style.zIndex = layer+1;
            el.onclick = ()=>pickCard(el);
            gameArea.appendChild(el);
            cards.push(el);
        }
    }
    refreshTop();
}

function refreshTop(){
    cards.forEach(c=>c.classList.remove('disabled'));
    for(let i=cards.length-1;i>=0;i--){
        const c = cards[i];
        if(c.classList.contains('taken')) continue;
        const r = c.getBoundingClientRect();
        for(let j=i-1;j>=0;j--){
            const u = cards[j];
            if(u.classList.contains('taken')) continue;
            const ur = u.getBoundingClientRect();
            if(!(r.right < ur.left+6 || r.left > ur.right-6 || r.bottom < ur.top+6 || r.top > ur.bottom-6)){
                u.classList.add('disabled');
            }
        }
    }
}

function pickCard(el){
    if(el.classList.contains('disabled')||el.classList.contains('taken')) return;
    if(slot.length >= maxSlot){
        failModal.style.display = 'flex'; bgm.pause(); return;
    }
    takeAudio.currentTime = 0; takeAudio.play().catch(()=>{});
    el.classList.add('taken');
    slot.push(el.dataset.icon);
    checkMatch(); renderSlot(); refreshTop(); updateInfo(); checkWin();
}

function checkMatch(){
    const cnt = {};
    slot.forEach(e=>cnt[e]=(cnt[e]||0)+1);
    for(const k in cnt){
        if(cnt[k]>=3){
            slot = slot.filter(e=>e!=k);
            score += 10; clearCount++;
            scoreNum.innerText = score;
            clearAudio.currentTime = 0; clearAudio.play().catch(()=>{});
            if(clearCount %5 ===0){ showCheer(); }
        }
    }
}

function showCheer(){
    const txt = cheerTexts[Math.floor(Math.random()*cheerTexts.length)];
    cheerText.innerText = txt;
    cheerModal.style.display = 'block';
}
function closeCheer(){ cheerModal.style.display = 'none'; }

function renderSlot(){
    slotArea.innerHTML = '';
    for(let i=0;i<maxSlot;i++){
        const s = document.createElement('div');
        s.className = 'slot';
        if(slot[i]) s.innerText = slot[i];
        slotArea.appendChild(s);
    }
}

function updateInfo(){
    const cnt = cards.filter(c=>!c.classList.contains('taken')).length;
    leftNum.innerText = cnt;
}

function checkWin(){
    if(cards.every(c=>c.classList.contains('taken'))){
        winModal.style.display = 'flex'; bgm.pause();
    }
}

window.onload = start;
</script>
</body>
</html>
